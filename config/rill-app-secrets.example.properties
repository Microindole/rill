# PostgreSQL business database
APP_DB_URL=jdbc:postgresql://localhost:5432/rill_app
APP_DB_USERNAME=postgres
APP_DB_PASSWORD=change-me

# JWT
APP_AUTH_JWT_SECRET=change-me-to-a-long-random-secret
APP_AUTH_JWT_TTL_DAYS=7
APP_AUTH_FRONTEND_BASE_URL=http://localhost:5173

# GitHub OAuth2
APP_AUTH_GITHUB_ENABLED=false
APP_AUTH_GITHUB_CLIENT_ID=
APP_AUTH_GITHUB_CLIENT_SECRET=
APP_AUTH_OAUTH2_PENDING_STORE=redis
APP_AUTH_OAUTH2_PENDING_TTL_MINUTES=10

# Web
APP_WEB_CORS_ALLOWED_ORIGINS=http://localhost:5173

# Redis
APP_REDIS_HOST=127.0.0.1
APP_REDIS_PORT=6379
APP_REDIS_PASSWORD=
APP_REDIS_DATABASE=0

# RocketMQ
APP_EXPORT_TASK_TRANSPORT=rocketmq
APP_EXPORT_TASK_TOPIC=rill-export-task
APP_ROCKETMQ_NAME_SERVER=127.0.0.1:9876
APP_ROCKETMQ_PRODUCER_GROUP=rill-app-web-producer
APP_ROCKETMQ_CONSUMER_GROUP=rill-app-web-consumer

# Login captcha (recommended: Cloudflare Turnstile)
APP_AUTH_CAPTCHA_ENABLED=false
APP_AUTH_CAPTCHA_PROVIDER=turnstile
APP_AUTH_CAPTCHA_SITE_KEY=
APP_AUTH_CAPTCHA_SECRET_KEY=

# Email verification / password reset
APP_MAIL_ENABLED=false
APP_MAIL_FROM=noreply@example.com
APP_MAIL_HOST=smtp.example.com
APP_MAIL_PORT=587
APP_MAIL_USERNAME=
APP_MAIL_PASSWORD=
APP_MAIL_SMTP_AUTH=true
APP_MAIL_SMTP_STARTTLS=true

# Workspace
APP_WORKSPACE_EXPORT_DIR=target/exports


