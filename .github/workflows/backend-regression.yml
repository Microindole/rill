name: Backend Regression

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-regression:
    name: Backend Regression / Linux / Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run maintained backend regression suite
        run: >
          ./mvnw -B -pl rill-core,rill-server -am
          -Dsurefire.failIfNoSpecifiedTests=false
          "-Dtest=ParserTest,PlannerTest,SemanticAnalyzerTest,DataTypeTest,MysqlProtocolHandlerTest"
          test

