name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths-ignore:
      - "data/**"
      - "target/**"
      - "web/dist/**"
  pull_request:
    paths-ignore:
      - "data/**"
      - "target/**"
      - "web/dist/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflow: ${{ steps.filter.outputs.workflow }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "pom.xml"
              - "mvnw"
              - ".mvn/**"
              - "rill-*/pom.xml"
              - "rill-*/src/**"
              - "packaging/**"
              - "scripts/build.*"
              - "scripts/rill.*"
            frontend:
              - "web/**"
            workflow:
              - ".github/workflows/**"
              - ".github/dependabot.yml"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  backend-cross-platform:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    uses: ./.github/workflows/backend-cross-platform.yml

  backend-regression:
    needs:
      - changes
      - backend-cross-platform
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    uses: ./.github/workflows/backend-regression.yml

  frontend-cross-platform:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    uses: ./.github/workflows/frontend-cross-platform.yml
