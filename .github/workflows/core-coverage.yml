name: Core Coverage

on:
  workflow_call:

permissions:
  contents: read

jobs:
  core-coverage:
    name: Core Coverage / Linux / Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run core tests with JaCoCo
        run: ./mvnw -B -pl rill-core -am verify

      - name: Upload JaCoCo XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage-report
          path: rill-core/target/site/jacoco/jacoco.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rill-core/target/site/jacoco/jacoco.xml
          flags: rill-core
          name: rill-core
          fail_ci_if_error: false
