name: App Web Coverage

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  app-web-coverage:
    name: App Web Coverage / Linux / Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Install dependent modules without tests
        run: ./mvnw -B -pl rill-core -am -DskipTests install

      - name: Run app web tests with JaCoCo
        run: ./mvnw -B -pl rill-app-web test org.jacoco:jacoco-maven-plugin:report

      - name: Upload JaCoCo XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-web-coverage-report
          path: rill-app-web/target/site/jacoco/jacoco.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rill-app-web/target/site/jacoco/jacoco.xml
          flags: rill-app-web
          name: rill-app-web
          fail_ci_if_error: false
