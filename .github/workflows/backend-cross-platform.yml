name: Backend Cross Platform

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-cross-platform:
    name: Backend Package / ${{ matrix.label }} / Java 21
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-arm64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: windows-11-arm
            label: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Package backend on Windows
        if: runner.os == 'Windows'
        run: .\mvnw.cmd -B -DskipTests package

      - name: Package backend on Unix
        if: runner.os != 'Windows'
        run: ./mvnw -B -DskipTests package

      - name: Upload packaged backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ matrix.label }}
          path: |
            rill-server/target/rill-server-*-server.jar
            rill-server/target/rill-server-*-mysql-server.jar
            rill-client/target/rill-client-*-cli.jar
            rill-client/target/rill-client-*-gui.jar
            rill-app-web/target/rill-app-web-*.jar
            !rill-app-web/target/*.jar.original
            rill-launcher/target/rill-launcher-*.jar
          if-no-files-found: error
