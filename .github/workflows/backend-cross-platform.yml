name: Backend Cross Platform

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-cross-platform:
    name: Backend / ${{ matrix.label }} / Java 21
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-arm64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: windows-11-arm
            label: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Compile backend on Windows
        if: runner.os == 'Windows'
        run: .\mvnw.cmd -B -DskipTests compile

      - name: Compile backend on Unix
        if: runner.os != 'Windows'
        run: ./mvnw -B -DskipTests compile
