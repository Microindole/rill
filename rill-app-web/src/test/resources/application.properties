spring.datasource.url=jdbc:h2:mem:rill_app_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
app.auth.jwt-secret=test-jwt-secret
app.auth.jwt-ttl-days=1
app.auth.frontend-base-url=http://localhost:5173
app.auth.oauth2.github.enabled=false
app.auth.oauth2.pending.store=memory
app.auth.oauth2.pending.ttl-minutes=10
app.auth.oauth2.pending.redis-key-prefix=test:rill:auth:oauth2:pending:
app.auth.verification-token.store=database
app.auth.verification-token.ttl-minutes=30
app.auth.verification-token.redis-key-prefix=test:rill:auth:verification:
spring.security.oauth2.client.registration.github.client-id=
spring.security.oauth2.client.registration.github.client-secret=
spring.security.oauth2.client.registration.github.scope=read:user,user:email
app.auth.captcha.enabled=false
app.auth.captcha.provider=turnstile
app.auth.captcha.turnstile.site-key=
app.auth.captcha.turnstile.secret-key=
app.mail.enabled=false
app.mail.from=test@example.com
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
app.messaging.export-task.transport=local
app.messaging.export-task.topic=test-rill-export-task
rocketmq.name-server=
rocketmq.producer.group=test-rill-app-web-producer
rocketmq.consumer.group=test-rill-app-web-consumer
