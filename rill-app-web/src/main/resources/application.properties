spring.application.name=rill
server.port=8080
spring.config.import=optional:file:./config/rill-app-secrets.properties
server.forward-headers-strategy=framework

# Web
app.web.cors.allowed-origins=${APP_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Business database
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/rill_app}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Authentication
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:rill-dev-secret-change-me}
app.auth.jwt-ttl-days=${APP_AUTH_JWT_TTL_DAYS:7}
app.auth.frontend-base-url=${APP_AUTH_FRONTEND_BASE_URL:http://localhost:5173}
app.auth.verification-token.store=${APP_AUTH_VERIFICATION_TOKEN_STORE:database}
app.auth.verification-token.ttl-minutes=${APP_AUTH_VERIFICATION_TOKEN_TTL_MINUTES:30}
app.auth.verification-token.redis-key-prefix=${APP_AUTH_VERIFICATION_TOKEN_REDIS_KEY_PREFIX:rill:auth:verification:}

# Login captcha
app.auth.captcha.enabled=${APP_AUTH_CAPTCHA_ENABLED:false}
app.auth.captcha.provider=${APP_AUTH_CAPTCHA_PROVIDER:turnstile}
app.auth.captcha.turnstile.site-key=${APP_AUTH_CAPTCHA_SITE_KEY:}
app.auth.captcha.turnstile.secret-key=${APP_AUTH_CAPTCHA_SECRET_KEY:}

# Mail
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:noreply@example.com}
spring.mail.host=${APP_MAIL_HOST:}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_SMTP_STARTTLS:true}

# Workspace
app.workspace.export-dir=${APP_WORKSPACE_EXPORT_DIR:target/exports}

# Redis
spring.data.redis.host=${APP_REDIS_HOST:localhost}
spring.data.redis.port=${APP_REDIS_PORT:6379}
spring.data.redis.password=${APP_REDIS_PASSWORD:}
spring.data.redis.database=${APP_REDIS_DATABASE:0}

# Messaging
app.messaging.export-task.transport=${APP_EXPORT_TASK_TRANSPORT:local}
app.messaging.export-task.topic=${APP_EXPORT_TASK_TOPIC:rill-export-task}
rocketmq.name-server=${APP_ROCKETMQ_NAME_SERVER:}
rocketmq.producer.group=${APP_ROCKETMQ_PRODUCER_GROUP:rill-app-web-producer}
rocketmq.consumer.group=${APP_ROCKETMQ_CONSUMER_GROUP:rill-app-web-consumer}
