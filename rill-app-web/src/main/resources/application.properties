spring.application.name=rill
server.port=8080
spring.config.import=optional:file:./config/rill-app-secrets.properties
app.web.cors.allowed-origins=http://localhost:5173
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/rill_app}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis-plus.configuration.map-underscore-to-camel-case=true
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:rill-dev-secret-change-me}
app.auth.jwt-ttl-days=${APP_AUTH_JWT_TTL_DAYS:7}
app.auth.frontend-base-url=${APP_AUTH_FRONTEND_BASE_URL:http://localhost:5173}
app.auth.captcha.enabled=${APP_AUTH_CAPTCHA_ENABLED:false}
app.auth.captcha.provider=${APP_AUTH_CAPTCHA_PROVIDER:turnstile}
app.auth.captcha.turnstile.site-key=${APP_AUTH_CAPTCHA_SITE_KEY:}
app.auth.captcha.turnstile.secret-key=${APP_AUTH_CAPTCHA_SECRET_KEY:}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:noreply@example.com}
spring.mail.host=${APP_MAIL_HOST:}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_SMTP_STARTTLS:true}
